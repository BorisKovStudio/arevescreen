<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>arevescreen</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Georgia, "Times New Roman", serif;
        background: #f3eee4;
        color: #1f1a17;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(177, 124, 76, 0.28), transparent 32%),
          linear-gradient(180deg, #f8f3ea 0%, #e9ddcb 100%);
      }

      main {
        width: min(680px, calc(100vw - 48px));
        padding: 48px 32px;
        border: 1px solid rgba(31, 26, 23, 0.12);
        border-radius: 24px;
        background: rgba(255, 252, 247, 0.88);
        box-shadow: 0 24px 60px rgba(55, 42, 31, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.4rem, 6vw, 4.5rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>arevescreen</h1>
      <p>Minimal static project deployed on Vercel.</p>
    </main>
  </body>
</html>
